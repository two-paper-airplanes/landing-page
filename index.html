<!DOCTYPE html>
<html>

<head>
    <title>Priyankha's Safari</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <div class="top-bar">
        <div class="top-left">
            <button id="menu" class="menu-button" aria-label="Menu">
                <i class="fa-solid fa-bars"></i>
            </button>
        
        </div>

        
        <div class="top-right">
            <h4>Bookmarks</h4>
            <a href="https://drive.google.com/drive/u/0/home">google drive</a> <br>
            <a href="https://github.com">github</a> <br>
            <a href="https://nusmods.com/timetable/sem-1">nusmods</a> <br>
            <a href="">...</a> <br>
        </div>
    </div>

    <div class="centre-block">
        <h1>Good Morning!</h1>
        <form method="get" action="http://www.google.com/search">
            <div class="search-box">
                    <input type="text" name="q" size="25" maxlength="255" value="Google Search" class="search-bar"/>
            </div>
        </form>
    </div>

    <div class="bottom-bar">
        <div class="bottom-left">
            <h4>Upcoming</h4>
        </div>
    
        <div class="bottom-right">
            <h4>To-Dos</h4>
    
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
